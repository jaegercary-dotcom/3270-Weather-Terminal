<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal Command Center</title>
    <style>
        body {
            background-color: #050d05;
            color: #00ff66; /* Vibrant phosphor green */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
            background: linear-gradient(rgba(10, 26, 10, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 5px, 6px 100%;
        }

        #terminal-container {
            border: 2px solid #00ff66;
            padding: 15px;
            height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5);
        }

        #history {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        #history::-webkit-scrollbar { display: none; }
        #history { -ms-overflow-style: none; scrollbar-width: none; }

        #input-line {
            display: flex;
            align-items: center;
        }

        #prompt {
            margin-right: 10px;
            flex-shrink: 0;
            font-weight: bold;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            flex-grow: 1;
            outline: none;
            text-shadow: 0 0 4px rgba(0, 255, 102, 0.5);
        }
    </style>
</head>
<body>

<div id="terminal-container" onclick="focusInput()">
    <div id="history"></div>
    <div id="input-line">
        <span id="prompt">NODE_01_ROOT\></span>
        <input type="text" id="cmd-input" autofocus autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
</div>

<script>
    const historyContainer = document.getElementById('history');
    const cmdInput = document.getElementById('cmd-input');

    // Simple local memory storage for a To-Do list
    let todoList = ["Charge tablet battery", "Drink water", "Review terminal code"];

    // Welcome Screen
    window.onload = function() {
        printOutput("==================================================\n  COMMAND CENTER OS v2.0 - INITIALIZATION COMPLETE \n==================================================\n\nType 'help' to see active terminal utilities.\n");
        focusInput();
    };

    function focusInput() { cmdInput.focus(); }

    function printOutput(text) {
        historyContainer.innerText += text + '\n';
        historyContainer.scrollTop = historyContainer.scrollHeight;
    }

    // Command Logic
    async function processCommand(fullInput) {
        const args = fullInput.split(' ');
        const command = args[0].toLowerCase();
        
        printOutput(`NODE_01_ROOT\\> ${fullInput}`);

        if (command === '') return;

        switch(command) {
            case 'help':
                printOutput(
                    "AVAILABLE PROTOCOLS:\n" +
                    "  weather [city] - Fetch current weather (e.g., weather London)\n" +
                    "  todo           - View your current matrix task list\n" +
                    "  todo-add [msg] - Add a task to the checklist\n" +
                    "  todo-del [num] - Remove a task by its list number\n" +
                    "  quote          - Fetch an inspirational data packet\n" +
                    "  clear          - Wipe screen buffer\n" +
                    "  time           - System clock check"
                );
                break;

            case 'time':
                printOutput(`SYSTEM TIME: ${new Date().toLocaleTimeString()} | DATE: ${new Date().toLocaleTimeString([], {year: 'numeric', month: 'long', day: 'numeric'})}`);
                break;

            case 'clear':
                historyContainer.innerText = '';
                break;

            case 'todo':
                if (todoList.length === 0) {
                    printOutput("Checklist empty. All systems clear.");
                } else {
                    printOutput("CURRENT OBJECTIVES:");
                    todoList.forEach((task, index) => {
                        printOutput(`  [${index + 1}] ${task}`);
                    });
                }
                break;

            case 'todo-add':
                const task = args.slice(1).join(' ');
                if (!task) {
                    printOutput("ERR: Missing task description. Usage: todo-add [text]");
                } else {
                    todoList.push(task);
                    printOutput(`SUCCESS: Added objective [${todoList.length}]`);
                }
                break;

            case 'todo-del':
                const index = parseInt(args[1]) - 1;
                if (isNaN(index) || index < 0 || index >= todoList.length) {
                    printOutput("ERR: Invalid task index. Usage: todo-del [number]");
                } else {
                    const removed = todoList.splice(index, 1);
                    printOutput(`DELETED: "${removed}" removed from active cycle.`);
                }
                break;

            case 'weather':
                const city = args.slice(1).join(' ');
                if (!city) {
                    printOutput("ERR: Location required. Usage: weather [city_name]");
                    break;
                }
                printOutput(`CONNECTING TO METEOROLOGICAL SATELLITE FOR: ${city.toUpperCase()}...`);
                try {
                    // Using wttr.in format v2 (text-based weather perfect for terminal outputs)
                    const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?0AT`);
                    if (!response.ok) throw new Error("Satellite array dropped packet.");
                    const data = await response.text();
                    printOutput("\n" + data);
                } catch (err) {
                    printOutput(`NETWORK ERROR: Unable to compile weather data. (${err.message})`);
                }
                break;

            case 'quote':
                printOutput("QUERYING THINK-TANK ARCHIVE...");
                try {
                    const response = await fetch('https://dummyjson.com/quotes/random');
                    const data = await response.json();
                    printOutput(`\n"${data.quote}"\n  -- ${data.author}\n`);
                } catch (err) {
                    printOutput("NETWORK ERROR: Sub-routine timeout.");
                }
                break;

            default:
                printOutput(`ERR: unknown command sequence '${command}'. Input 'help' for grid options.`);
        }
    }

    // Event Listener for execution
    cmdInput.addEventListener('keydown', async function(e) {
        if (e.key === 'Enter') {
            const input = cmdInput.value.trim();
            cmdInput.value = ''; // Immediately clear input line
            
            // Disable input temporarily while waiting for network fetches
            cmdInput.disabled = true;
            await processCommand(input);
            cmdInput.disabled = false;
            focusInput();
        }
    });
</script>

</body>
</html>
